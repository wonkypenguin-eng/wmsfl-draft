<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>WMSFL Extravaganza Draft Room</title>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #1a1a1a; font-size: 14px; overscroll-behavior: none; }

  #loading { display: flex; align-items: center; justify-content: center; height: 100vh; font-size: 18px; color: #666; flex-direction: column; gap: 12px; }
  .loading-sub { font-size: 13px; color: #999; }
  #app { display: none; height: 100vh; display: none; flex-direction: column; }

  /* ── Top bar ── */
  .top-bar { background: #1a1a2e; color: white; padding: 10px 14px; flex-shrink: 0; }
  .top-bar-row1 { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
  .league-title { font-size: 14px; font-weight: 700; color: #e8b84b; flex: 1; }
  .top-btn { background: transparent; border: 1px solid #555; color: #ccc; padding: 4px 10px; border-radius: 6px; cursor: pointer; font-size: 12px; white-space: nowrap; }
  .top-btn:hover { background: #2d2d4e; color: white; }
  .top-bar-row2 { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .on-clock-label { font-size: 11px; color: #aaa; }
  .on-clock-team { font-size: 15px; font-weight: 700; color: white; }
  .pick-badge { background: #2d2d4e; padding: 2px 8px; border-radius: 20px; font-size: 11px; color: #ccc; }
  .timer-wrap { margin-left: auto; display: flex; align-items: center; gap: 6px; background: #2d2d4e; padding: 4px 10px; border-radius: 20px; }
  .timer { font-size: 16px; font-weight: 700; color: #e8b84b; font-variant-numeric: tabular-nums; }
  .timer.warning { color: #ff9500; }
  .timer.expired { color: #e74c3c; animation: pulse 1s infinite; }
  .timer.paused { color: #888; }
  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.4} }
  .paused-pill { background: #e8b84b; color: #1a1a2e; font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 10px; }
  .autopick-pill { background: #e74c3c; color: white; font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 10px; display: none; animation: pulse 1s infinite; }

  /* ── Keeper mode banner ── */
  .keeper-banner { background: #4a6fa5; color: white; padding: 10px 14px; flex-shrink: 0; display: none; }
  .keeper-banner.visible { display: block; }
  .keeper-banner-row1 { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
  .keeper-banner-title { font-size: 14px; font-weight: 700; flex: 1; }
  .mode-btn { padding: 4px 12px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.4); background: transparent; color: white; cursor: pointer; font-size: 12px; }
  .mode-btn.primary { background: white; color: #1a1a2e; font-weight: 600; border-color: white; }
  .mode-btn.danger { border-color: #ffaaaa; color: #ffaaaa; }
  .keeper-progress { font-size: 12px; opacity: 0.85; }

  /* ── Import panel ── */
  .import-panel { background: #1e3a5f; color: white; padding: 12px 14px; flex-shrink: 0; display: none; flex-direction: column; gap: 8px; }
  .import-panel.visible { display: flex; }
  .import-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .import-select { padding: 5px 8px; border-radius: 6px; border: none; font-size: 13px; background: white; color: #333; flex: 1; min-width: 120px; }
  .import-textarea { width: 100%; height: 100px; padding: 8px; border-radius: 6px; border: none; font-size: 12px; font-family: monospace; resize: vertical; color: #333; }
  .import-btn { padding: 5px 14px; background: #e8b84b; color: #1a1a2e; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 700; }
  .import-results { font-size: 12px; line-height: 1.6; max-height: 120px; overflow-y: auto; }

  /* ── Autopick banner ── */
  .autopick-banner { background: #e74c3c; color: white; padding: 8px 14px; font-size: 13px; font-weight: 500; display: none; align-items: center; gap: 8px; flex-shrink: 0; }
  .autopick-banner.visible { display: flex; }

  /* ── Tab bar (mobile nav) ── */
  .tab-bar { background: white; border-bottom: 1px solid #e0e0e0; display: flex; flex-shrink: 0; }
  .tab-btn { flex: 1; padding: 10px 4px; text-align: center; font-size: 12px; font-weight: 500; color: #888; border: none; background: none; cursor: pointer; border-bottom: 2px solid transparent; }
  .tab-btn.active { color: #1a1a2e; border-bottom-color: #e8b84b; }

  /* ── Keeper team bar ── */
  .keeper-team-bar { padding: 8px 12px; background: #eef2ff; border-bottom: 1px solid #c5d0f0; display: none; align-items: center; gap: 8px; flex-shrink: 0; }
  .keeper-team-bar.visible { display: flex; }
  .keeper-team-select { flex: 1; padding: 5px 8px; border: 1px solid #c5d0f0; border-radius: 6px; font-size: 13px; background: white; }
  .keeper-counter { font-size: 13px; font-weight: 600; color: #4a6fa5; white-space: nowrap; }
  .keeper-counter.full { color: #2ecc71; }

  /* ── Pool controls ── */
  .pool-controls { padding: 8px 12px; background: white; border-bottom: 1px solid #e0e0e0; flex-shrink: 0; }
  .sport-filters { display: flex; gap: 6px; margin-bottom: 8px; flex-wrap: wrap; }
  .sport-btn { padding: 4px 10px; border-radius: 20px; border: 1px solid #ddd; background: white; cursor: pointer; font-size: 12px; font-weight: 500; color: #666; }
  .sport-btn.active { color: white; border-color: transparent; }
  .sport-btn.active.all { background: #1a1a2e; }
  .sport-btn.active.nfl { background: #013369; }
  .sport-btn.active.nba { background: #c9082a; }
  .sport-btn.active.nhl { background: #000; }
  .sport-btn.active.mlb { background: #002d72; }
  .pool-search-row { display: flex; gap: 8px; align-items: center; }
  .search-box { flex: 1; padding: 6px 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 13px; outline: none; }
  .hide-drafted-toggle { display: flex; align-items: center; gap: 5px; font-size: 12px; color: #666; white-space: nowrap; cursor: pointer; }
  .toggle-switch { position: relative; width: 32px; height: 18px; }
  .toggle-switch input { opacity: 0; width: 0; height: 0; }
  .toggle-slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background: #ccc; border-radius: 18px; transition: 0.2s; }
  .toggle-slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 2px; bottom: 2px; background: white; border-radius: 50%; transition: 0.2s; }
  input:checked + .toggle-slider { background: #1a1a2e; }
  input:checked + .toggle-slider:before { transform: translateX(14px); }
  .pool-count { font-size: 11px; color: #999; }

  /* ── Main scrollable area ── */
  .tab-content { flex: 1; overflow: hidden; display: none; flex-direction: column; }
  .tab-content.active { display: flex; }

  /* Player pool */
  .pool-table-wrap { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
  .pool-table { width: 100%; border-collapse: collapse; }
  .pool-table th { padding: 7px 10px; text-align: left; font-size: 10px; font-weight: 700; text-transform: uppercase; color: #999; background: #f5f5f5; border-bottom: 1px solid #e0e0e0; position: sticky; top: 0; z-index: 1; }
  .pool-table td { padding: 8px 10px; border-bottom: 1px solid #f0f0f0; font-size: 13px; vertical-align: middle; }
  .pool-table tr:hover td { background: #f8f8f8; }
  .pool-table tr.drafted td { opacity: 0.3; }
  .pool-table tr.kept-row td { background: #f0f7ff; }
  .pool-table tr.hidden-row { display: none; }
  .player-name-cell { font-weight: 500; color: #1a1a1a; }
  .player-sub { font-size: 11px; color: #999; }
  .sport-tag { display: inline-block; padding: 2px 6px; border-radius: 8px; font-size: 10px; font-weight: 700; }
  .tag-NFL { background: #dce8ff; color: #013369; }
  .tag-NBA { background: #ffe0e4; color: #c9082a; }
  .tag-NHL { background: #e8e8e8; color: #333; }
  .tag-MLB { background: #dce8ff; color: #002d72; }
  .kept-tag { display: inline-block; padding: 2px 6px; border-radius: 8px; font-size: 10px; font-weight: 700; background: #4a6fa5; color: white; }
  .draft-pick-btn { padding: 5px 12px; background: #1a1a2e; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 12px; min-height: 32px; }
  .keep-btn { padding: 5px 12px; background: #4a6fa5; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 12px; min-height: 32px; }
  .unkept-btn { padding: 5px 12px; background: white; color: #4a6fa5; border: 1px solid #4a6fa5; border-radius: 5px; cursor: pointer; font-size: 12px; min-height: 32px; }

  /* Teams tab */
  .teams-list { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; background: white; }
  .team-item { padding: 12px 14px; border-bottom: 1px solid #f0f0f0; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
  .team-item:hover { background: #f8f8f8; }
  .team-item.on-clock { background: #fff8e7; border-left: 4px solid #e8b84b; }
  .team-item.on-clock .team-name { color: #b8860b; font-weight: 700; }
  .team-item.selected { background: #e8f0fe; border-left: 4px solid #4a6fa5; }
  .team-item.keeper-active { background: #e8f0fe; border-left: 4px solid #4a6fa5; }
  .team-name { font-size: 14px; color: #333; font-weight: 500; }
  .team-count { font-size: 12px; color: #999; background: #f0f0f0; padding: 2px 8px; border-radius: 10px; }
  .team-count.has-keepers { background: #4a6fa5; color: white; }
  .team-count.full { background: #2ecc71; color: white; }
  .team-roster-panel { display: none; background: #f8f9ff; padding: 10px 14px; border-bottom: 1px solid #dde; }
  .team-roster-panel.visible { display: block; }
  .roster-sport-group { margin-bottom: 8px; }
  .roster-sport-label { font-size: 10px; font-weight: 700; text-transform: uppercase; color: #999; margin-bottom: 4px; }
  .roster-player { font-size: 13px; color: #333; padding: 3px 0; border-bottom: 1px solid #eef; display: flex; justify-content: space-between; }
  .roster-player-pos { color: #999; font-size: 12px; }

  /* Picks / Keeper summary tab */
  .picks-list { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; background: white; }
  .pick-item { padding: 10px 14px; border-bottom: 1px solid #f0f0f0; }
  .pick-item-header { display: flex; justify-content: space-between; margin-bottom: 3px; }
  .pick-num { font-size: 11px; color: #999; }
  .pick-player { font-size: 14px; font-weight: 500; }
  .pick-team { font-size: 12px; color: #666; }
  .pick-item.autopick .pick-player { color: #c0392b; }
  .pick-item.autopick .pick-num::after { content: ' · AUTO'; color: #e74c3c; font-weight: 700; }
  .keeper-team-section { padding: 10px 14px; border-bottom: 1px solid #f0f0f0; }
  .keeper-team-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .keeper-team-name { font-size: 14px; font-weight: 600; }
  .keeper-team-badge { font-size: 11px; padding: 2px 8px; border-radius: 10px; background: #eef2ff; color: #4a6fa5; font-weight: 600; }
  .keeper-team-badge.full { background: #d4f7e4; color: #1a7a42; }
  .keeper-player-item { padding: 3px 0; font-size: 13px; color: #444; display: flex; justify-content: space-between; }
  .keeper-player-sport { font-size: 11px; color: #999; }
  .empty-state { padding: 30px 20px; text-align: center; color: #bbb; font-size: 14px; }

  /* Commissioner panel */
  .comm-panel { background: #fff8e7; border-top: 1px solid #e8d88a; padding: 10px 14px; display: none; gap: 8px; flex-wrap: wrap; align-items: center; flex-shrink: 0; }
  .comm-panel.visible { display: flex; }
  .comm-label { font-size: 11px; font-weight: 700; color: #b8860b; text-transform: uppercase; width: 100%; }
  .comm-btn { padding: 6px 12px; border: 1px solid #d4a800; background: white; color: #8a6500; border-radius: 5px; cursor: pointer; font-size: 12px; }
  .comm-select { padding: 6px 8px; border: 1px solid #d4a800; border-radius: 5px; font-size: 12px; color: #333; background: white; flex: 1; min-width: 120px; }

  /* Modal */
  .modal-overlay { position: fixed; top:0; left:0; right:0; bottom:0; background: rgba(0,0,0,0.6); display: none; align-items: flex-end; justify-content: center; z-index: 100; }
  .modal-overlay.visible { display: flex; }
  .modal { background: white; border-radius: 16px 16px 0 0; padding: 24px 20px; width: 100%; max-width: 500px; }
  .modal h3 { font-size: 17px; margin-bottom: 8px; }
  .modal p { font-size: 14px; color: #555; margin-bottom: 20px; line-height: 1.5; }
  .modal-btns { display: flex; gap: 10px; }
  .btn-cancel { flex: 1; padding: 12px; border: 1px solid #ddd; background: white; border-radius: 8px; cursor: pointer; font-size: 14px; }
  .btn-confirm { flex: 2; padding: 12px; background: #1a1a2e; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 600; }

  /* Desktop overrides */
  @media (min-width: 768px) {
    #app { flex-direction: column; }
    .tab-bar { display: none; }
    .main-grid { display: grid !important; grid-template-columns: 220px 1fr 240px; flex: 1; overflow: hidden; }
    .tab-content { display: flex !important; flex-direction: column; overflow: hidden; }
    .tab-content.teams-tab { border-right: 1px solid #e0e0e0; }
    .tab-content.picks-tab { border-left: 1px solid #e0e0e0; }
    .tab-content.pool-tab { flex: 1; }
    .modal-overlay { align-items: center; }
    .modal { border-radius: 12px; max-width: 420px; }
    .comm-panel { flex-shrink: 0; }
    .pool-table th:nth-child(1), .pool-table td:nth-child(1) { display: table-cell; }
  }

  @media (max-width: 767px) {
    .main-grid { display: flex; flex: 1; overflow: hidden; flex-direction: column; }
    .tab-content { flex: 1; }
    /* Hide ADP col on mobile */
    .pool-table th:nth-child(1), .pool-table td:nth-child(1) { display: none; }
  }
</style>
</head>
<body>
<div id="loading">
  <div>⚡ Loading WMSFL Draft Room…</div>
  <div class="loading-sub" id="loading-sub">Fetching player pool…</div>
</div>

<div id="app" style="display:none;flex-direction:column;height:100vh">

  <!-- KEEPER BANNER -->
  <div class="keeper-banner" id="keeper-banner">
    <div class="keeper-banner-row1">
      <span class="keeper-banner-title">🔒 Keeper Entry Mode</span>
      <button class="mode-btn" onclick="showImportPanel()">⬆ Import</button>
      <button class="mode-btn danger" onclick="clearAllKeepers()">Clear</button>
      <button class="mode-btn primary" onclick="lockKeepers()">Lock &amp; Start Draft →</button>
    </div>
    <div class="keeper-progress" id="keeper-progress-label"></div>
  </div>

  <!-- IMPORT PANEL -->
  <div class="import-panel" id="import-panel">
    <div class="import-row">
      <strong style="font-size:13px;white-space:nowrap">⬆ Import Keepers</strong>
      <select class="import-select" id="import-team-select"><option value="">— Team —</option></select>
      <select class="import-select" id="import-sport-select">
        <option value="ALL">All sports</option>
        <option value="NFL">NFL</option>
        <option value="NBA">NBA</option>
        <option value="NHL">NHL</option>
        <option value="MLB">MLB</option>
      </select>
      <button class="import-btn" onclick="runImport()">Import</button>
      <button class="mode-btn" onclick="hideImportPanel()">✕</button>
    </div>
    <textarea class="import-textarea" id="import-textarea" placeholder="Paste keeper list — position info after · is stripped automatically"></textarea>
    <div class="import-results" id="import-results"></div>
  </div>

  <!-- DRAFT TOP BAR -->
  <div id="draft-header" style="display:none">
    <div class="top-bar">
      <div class="top-bar-row1">
        <span class="league-title">⚡ WMSFL Extravaganza Draft</span>
        <button class="top-btn" id="pause-btn" onclick="togglePause()">Pause</button>
        <button class="top-btn" onclick="showNameModal()">Set my team</button>
        <button class="top-btn" onclick="unlockKeepers()">Edit keepers</button>
      </div>
      <div class="top-bar-row2">
        <span class="on-clock-label">On the clock:</span>
        <span class="on-clock-team" id="clock-team">—</span>
        <span class="pick-badge" id="pick-badge">R1 P1</span>
        <div class="timer-wrap">
          <span id="timer" class="timer">3:00:00</span>
          <span class="paused-pill" id="paused-pill" style="display:none">PAUSED</span>
          <span class="autopick-pill" id="autopick-pill">AUTO</span>
        </div>
      </div>
    </div>
    <div class="autopick-banner" id="autopick-banner">
      ⚠️ Auto-picking in <span id="autopick-countdown">60</span>s
    </div>
  </div>

  <!-- TAB BAR (mobile only) -->
  <div class="tab-bar" id="tab-bar">
    <button class="tab-btn active" onclick="switchTab('pool')">Players</button>
    <button class="tab-btn" onclick="switchTab('teams')">Teams</button>
    <button class="tab-btn" onclick="switchTab('picks')">Picks</button>
  </div>

  <!-- KEEPER TEAM BAR -->
  <div class="keeper-team-bar" id="keeper-team-bar">
    <select class="keeper-team-select" id="keeper-team-select" onchange="onKeeperTeamChange()">
      <option value="">— Select team to enter keepers —</option>
    </select>
    <span class="keeper-counter" id="keeper-counter">— / 25</span>
  </div>

  <!-- MAIN GRID -->
  <div class="main-grid" id="main-grid">

    <!-- TEAMS TAB -->
    <div class="tab-content teams-tab" id="tab-teams">
      <div class="sidebar-section-title" id="left-sidebar-title" style="padding:10px 12px 6px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#999;border-bottom:1px solid #f0f0f0;background:white;">Teams</div>
      <div class="teams-list" id="team-list"></div>
    </div>

    <!-- POOL TAB -->
    <div class="tab-content pool-tab active" id="tab-pool">
      <div class="pool-controls">
        <div class="sport-filters">
          <button class="sport-btn active all" onclick="setSport('ALL',this)">All</button>
          <button class="sport-btn nfl" onclick="setSport('NFL',this)">NFL</button>
          <button class="sport-btn nba" onclick="setSport('NBA',this)">NBA</button>
          <button class="sport-btn nhl" onclick="setSport('NHL',this)">NHL</button>
          <button class="sport-btn mlb" onclick="setSport('MLB',this)">MLB</button>
        </div>
        <div class="pool-search-row">
          <input class="search-box" type="text" placeholder="Search players…" oninput="setSearch(this.value)" />
          <label class="hide-drafted-toggle">
            <span class="toggle-switch">
              <input type="checkbox" id="hide-drafted-toggle" onchange="setHideDrafted(this.checked)" />
              <span class="toggle-slider"></span>
            </span>
            Hide drafted
          </label>
        </div>
        <div class="pool-count" id="pool-count"></div>
      </div>
      <div class="pool-table-wrap">
        <table class="pool-table">
          <thead>
            <tr>
              <th>ADP</th>
              <th>Player</th>
              <th>Sport</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="player-tbody"></tbody>
        </table>
      </div>
      <div class="comm-panel" id="comm-panel">
        <span class="comm-label">⚙ Commissioner Tools</span>
        <select class="comm-select" id="comm-team-select"></select>
        <button class="comm-btn" onclick="advanceClock()">Advance →</button>
        <button class="comm-btn" onclick="resetDraft()">Reset</button>
        <button class="comm-btn" onclick="exportDraftCSV()">⬇ Results</button>
        <button class="comm-btn" onclick="exportKeeperCSV()">⬇ Keepers</button>
      </div>
    </div>

    <!-- PICKS TAB -->
    <div class="tab-content picks-tab" id="tab-picks">
      <div class="sidebar-section-title" id="right-sidebar-title" style="padding:10px 12px 6px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#999;border-bottom:1px solid #f0f0f0;background:white;">Pick History</div>
      <div class="picks-list" id="right-sidebar-content"><div class="empty-state">No picks yet</div></div>
    </div>

  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h3 id="modal-title">Confirm</h3>
    <p id="modal-body"></p>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-confirm" onclick="confirmAction()">Confirm</button>
    </div>
  </div>
</div>

<script>
const FIREBASE_CONFIG = {

const CSV_URLS = {

  NBA: "https://docs.google.com/spreadsheets/d/e/2PACX-1vRS0VcRB8215ueOvGAFCGKo86obtR346EGEIgq3CCjCU21l5a80HoY_IPhaWz-kPROM_9ZPzZsNZPWZ/pub?gid=1895235108&single=true&output=csv",
  NHL: "https://docs.google.com/spreadsheets/d/e/2PACX-1vRS0VcRB8215ueOvGAFCGKo86obtR346EGEIgq3CCjCU21l5a80HoY_IPhaWz-kPROM_9ZPzZsNZPWZ/pub?gid=0&single=true&output=csv",
  MLB: "https://docs.google.com/spreadsheets/d/e/2PACX-1vRS0VcRB8215ueOvGAFCGKo86obtR346EGEIgq3CCjCU21l5a80HoY_IPhaWz-kPROM_9ZPzZsNZPWZ/pub?gid=1458137414&single=true&output=csv"
};
const TEAMS = ["Isaac/Jake","Kitzman","Kyle","Wonky","Houston","Trey","Ben","Brett","James","Razor","ProStars","Nic"];
const MAX_KEEPERS = 25, TOTAL_ROUNDS = 25, TIMER_SECONDS = 12*60*60, AUTOPICK_GRACE = 60, PAUSE_END_HOUR = 8;

firebase.initializeApp(FIREBASE_CONFIG);
const db = firebase.database();

let allPlayers = [], draftState = { picks:[], currentPick:0, paused:false, timerSeconds:TIMER_SECONDS, keepers:{}, keepersLocked:false };
let sportFilter='ALL', searchVal='', hideDrafted=false, pendingAction=null;
let timerInterval=null, autopickInterval=null, autopickCountdown=AUTOPICK_GRACE;
let selectedTeamIdx=null, activeKeeperTeam='', myTeamName=localStorage.getItem('wmsfl_team')||'';
let activeTab = 'pool';

// ── Helpers ──────────────────────────────────────────────────
function safeKey(t) { return t.replace(/\//g,'_'); }
function snakeOrder(i) { const r=Math.floor(i/12),p=i%12; return r%2===0?p:11-p; }
function teamForPick(i) { return TEAMS[snakeOrder(i)]; }
function isDraftActiveHour() { return ((new Date().getUTCHours()+19)%24) >= PAUSE_END_HOUR; }
function formatTime(s) { const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sc=s%60; return h+':'+String(m).padStart(2,'0')+':'+String(sc).padStart(2,'0'); }

function switchTab(tab) {

// ── CSV ──────────────────────────────────────────────────────
async function parseCSV(url, sport) {
  const resp = await fetch(url);
  const text = await resp.text();
  return text.trim().split('\n').slice(1).map(function(line) {
    const cols = line.split(',').map(function(c) { return c.replace(/^"|"$/g,'').trim(); });
    return { name:cols[0], sport:sport, position:cols[2], team:cols[3], adp:parseFloat(cols[4])||9999, drafted:false, draftedBy:null };
  }).filter(function(p) { return p.name; });
}
async function loadPlayers() {
  const results = await Promise.all(Object.entries(CSV_URLS).map(function(e) { return parseCSV(e[1],e[0]); }));
  allPlayers = results.flat().sort(function(a,b) { return a.adp-b.adp; });
}

function applyMode() {

  document.getElementById('draft-header').style.display = keeper ? 'none' : 'block';

  document.getElementById('right-sidebar-title').textContent = keeper ? 'Keeper Summary' : 'Pick History';

// ── Keeper helpers ───────────────────────────────────────────
function keepersForTeam(team) { const k=draftState.keepers[safeKey(team)]; return k?Object.values(k):[]; }
function isKept(name) { return TEAMS.some(function(t) { return keepersForTeam(t).some(function(k) { return k.name===name; }); }); }
function keptBy(name) { for(let i=0;i<TEAMS.length;i++) { if(keepersForTeam(TEAMS[i]).some(function(k){return k.name===name;})) return TEAMS[i]; } return null; }
function onKeeperTeamChange() { activeKeeperTeam=document.getElementById('keeper-team-select').value; updateKeeperCounter(); renderPool(); renderTeams(); }
function updateKeeperCounter() {
  const team=activeKeeperTeam;
  if(!team){document.getElementById('keeper-counter').textContent='— / 25';return;}
  const count=keepersForTeam(team).length;
  const el=document.getElementById('keeper-counter');
  el.textContent=count+' / '+MAX_KEEPERS+' kept';
  el.className='keeper-counter'+(count>=MAX_KEEPERS?' full':'');
}
function updateKeeperProgress() {
  const n=TEAMS.filter(function(t){return keepersForTeam(t).length>0;}).length;
  document.getElementById('keeper-progress-label').textContent=n+' of '+TEAMS.length+' teams have keepers entered';
}
function toggleKeeper(name) {
  const team=activeKeeperTeam;
  if(!team){alert('Please select a team first.');return;}
  const p=allPlayers.find(function(pl){return pl.name===name;});
  if(!p) return;
  const other=keptBy(name);
  if(other&&other!==team){alert(name+' is already kept by '+other+'.');return;}
  const kept=keepersForTeam(team).some(function(k){return k.name===name;});
  if(kept){
    const stored=draftState.keepers[safeKey(team)]||{};
    const key=Object.keys(stored).find(function(k){return stored[k].name===name;});
    if(key) db.ref('draft/keepers/'+safeKey(team)+'/'+key).remove();
  } else {
    if(keepersForTeam(team).length>=MAX_KEEPERS){alert(team+' already has 25 keepers.');return;}
    db.ref('draft/keepers/'+safeKey(team)).push({name:p.name,sport:p.sport,position:p.position,proTeam:p.team});
  }
}
function selectKeeperTeam(team) {
  activeKeeperTeam=team;
  document.getElementById('keeper-team-select').value=team;
  updateKeeperCounter(); renderPool(); renderTeams();
}
function lockKeepers() {
  const total=TEAMS.reduce(function(s,t){return s+keepersForTeam(t).length;},0);
  if(!confirm('Lock '+total+' keepers and start the draft?')) return;
  db.ref('draft/keepersLocked').set(true);
}
function unlockKeepers() {
  if(!confirm('Unlock keepers for editing? Draft will be paused.')) return;
  db.ref('draft/keepersLocked').set(false);
  db.ref('draft/paused').set(true);
}
function clearAllKeepers() {
  if(!confirm('Clear ALL keeper selections for all teams?')) return;
  db.ref('draft/keepers').remove();
}

// ── Import ───────────────────────────────────────────────────
function showImportPanel() {
  document.getElementById('import-panel').classList.add('visible');
  const sel=document.getElementById('import-team-select');
  if(sel.options.length<=1) TEAMS.forEach(function(t){const o=document.createElement('option');o.value=t;o.textContent=t;sel.appendChild(o);});
  document.getElementById('import-results').innerHTML='';
  document.getElementById('import-textarea').value='';
}
function hideImportPanel() { document.getElementById('import-panel').classList.remove('visible'); }
function normalizeName(n) {
  return n.toLowerCase()
    .replace(/\xe9/g,'e').replace(/\xe1/g,'a').replace(/\xed/g,'i').replace(/\xf3/g,'o').replace(/\xfa/g,'u')
    .replace(/\xfc/g,'u').replace(/\xf1/g,'n').replace(/\xe0/g,'a').replace(/\xe8/g,'e')
    .replace(/[^a-z0-9 ]/g,' ').replace(/\s+/g,' ').trim();
}
function parsePastedList(text) {
  return text.split('\n').map(function(line) {
    return line.split('\xb7')[0].split('·')[0].trim()
      .replace(/\(Batter\)/gi,'').replace(/\(Pitcher\)/gi,'').trim();
  }).filter(function(line) {
    return line.length>2&&!/^=+$/.test(line)&&!/^--/.test(line)&&!/LOCKED|KEEPERS|Enter into/i.test(line)&&!/^\d+$/.test(line);
  });
}
function fuzzyMatch(name, sport) {
  const norm=normalizeName(name);
  const pool=sport==='ALL'?allPlayers:allPlayers.filter(function(p){return p.sport===sport;});
  let best=null,bestScore=0;
  pool.forEach(function(p){
    const pn=normalizeName(p.name);
    if(pn===norm){best=p;bestScore=1;return;}
    if(pn.includes(norm)||norm.includes(pn)){
      const score=Math.min(pn.length,norm.length)/Math.max(pn.length,norm.length);
      if(score>bestScore){best=p;bestScore=score;}
    }
  });
  return bestScore>=0.8?best:null;
}
function runImport() {
  const team=document.getElementById('import-team-select').value;
  const sport=document.getElementById('import-sport-select').value;
  const text=document.getElementById('import-textarea').value;
  if(!team){alert('Please select a team first.');return;}
  if(!text.trim()){alert('Please paste a keeper list first.');return;}
  const names=parsePastedList(text);
  const matched=[],unmatched=[],dupes=[];
  const seen=new Set();
  names.forEach(function(name){
    if(seen.has(normalizeName(name))){dupes.push(name);return;}
    seen.add(normalizeName(name));
    const player=fuzzyMatch(name,sport);
    if(player){
      const other=keptBy(player.name);
      if(other&&other!==team){unmatched.push(name+' — kept by '+other);}
      else if(!keepersForTeam(team).some(function(k){return k.name===player.name;})){
        if(keepersForTeam(team).length>=MAX_KEEPERS){unmatched.push(name+' — 25 keeper limit reached');return;}
        db.ref('draft/keepers/'+safeKey(team)).push({name:player.name,sport:player.sport,position:player.position,proTeam:player.team});
        matched.push('✓ '+player.name+' ('+player.sport+')');
      } else { matched.push('✓ '+player.name+' — already kept'); }
    } else { unmatched.push('✗ "'+name+'" — not found'); }
  });
  let html='';
  if(matched.length) html+='<div style="color:#90ee90"><strong>'+matched.length+' imported:</strong><br>'+matched.join('<br>')+'</div>';
  if(unmatched.length) html+='<div style="color:#ffaaaa;margin-top:6px"><strong>'+unmatched.length+' not matched:</strong><br>'+unmatched.join('<br>')+'</div>';
  if(dupes.length) html+='<div style="color:#ffd700;margin-top:6px"><strong>'+dupes.length+' dupes skipped</strong></div>';
  document.getElementById('import-results').innerHTML=html||'<div style="color:#90ee90">Nothing to import.</div>';
}

function setSport(s,btn) {
  sportFilter=s;
  document.querySelectorAll('.sport-btn').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');

// ── Render pool ──────────────────────────────────────────────
function renderPool() {
  const tbody=document.getElementById('player-tbody');
  const keeper=isKeeperMode();
  const team=activeKeeperTeam;
  const available=allPlayers.filter(function(p){return !p.drafted&&!isKept(p.name);}).length;
  document.getElementById('pool-count').textContent=keeper?allPlayers.length+' players':available+' available';
  const q=searchVal.toLowerCase();
  tbody.innerHTML=allPlayers.map(function(p){
    const sportOk=sportFilter==='ALL'||p.sport===sportFilter;
    const searchOk=!q||p.name.toLowerCase().includes(q)||p.position.toLowerCase().includes(q)||p.team.toLowerCase().includes(q);
    if(!sportOk||!searchOk) return '';
    const kept=isKept(p.name);
    const keptByTeam=keptBy(p.name);
    const isMyKept=keptByTeam===team;
    const isDrafted=p.drafted||kept;
    const hideRow=!keeper&&hideDrafted&&isDrafted;
    const safeName=p.name.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    let actionBtn;
    if(keeper){
      if(kept&&isMyKept) actionBtn='<button class="unkept-btn" onclick="toggleKeeper(\''+safeName+'\')">✓ Kept</button>';
      else if(kept) actionBtn='<span class="kept-tag">'+keptByTeam+'</span>';
      else actionBtn='<button class="keep-btn" onclick="toggleKeeper(\''+safeName+'\')">Keep</button>';
    } else {
      if(isDrafted) actionBtn='<span style="color:#bbb;font-size:11px">'+(kept?'Kept':p.draftedBy||'Drafted')+'</span>';
      else actionBtn='<button class="draft-pick-btn" onclick="initDraft(\''+safeName+'\')">Draft</button>';
    }
    return '<tr class="'+(isDrafted&&!keeper?'drafted':'')+(kept&&isMyKept?' kept-row':'')+(hideRow?' hidden-row':'')+'">'
      +'<td style="color:#bbb;font-size:11px">'+(Math.round(p.adp)||'—')+'</td>'
      +'<td><div class="player-name-cell">'+p.name+'</div><div class="player-sub">'+p.position+' · '+p.team+'</div></td>'
      +'<td><span class="sport-tag tag-'+p.sport+'">'+p.sport+'</span></td>'
      +'<td>'+actionBtn+'</td></tr>';
  }).join('');
}

// ── Render teams ─────────────────────────────────────────────
function renderTeams() {
  const keeper=isKeeperMode();
  const currentTeam=teamForPick(draftState.currentPick);
  const teamPicks={};
  TEAMS.forEach(function(t){teamPicks[t]=[];});
  draftState.picks.forEach(function(p){if(teamPicks[p.team])teamPicks[p.team].push(p);});
  document.getElementById('team-list').innerHTML=TEAMS.map(function(t,i){
    const isOnClock=!keeper&&t===currentTeam;
    const isSelected=!keeper&&i===selectedTeamIdx;
    const isKeeperActive=keeper&&t===activeKeeperTeam;
    const picks=teamPicks[t]||[];
    const kc=keepersForTeam(t).length;
    const countClass=keeper?(kc>=MAX_KEEPERS?'full':kc>0?'has-keepers':''):'';
    const countText=keeper?kc+'/25':picks.length;
    const clickFn=keeper?'selectKeeperTeam(\''+t.replace(/'/g,"\\'")+'\')'  :'toggleTeam('+i+')';
    const rosterHTML=isSelected?buildRosterPanel(t,picks):'';
    return '<div class="team-item '+(isOnClock?'on-clock':'')+(isSelected?' selected':'')+(isKeeperActive?' keeper-active':'')+'" onclick="'+clickFn+'">'
      +'<span class="team-name">'+t+'</span>'
      +'<span class="team-count '+countClass+'">'+countText+'</span>'
      +'</div>'+rosterHTML;
  }).join('');
  if(!keeper){
    const sel=document.getElementById('comm-team-select');
    sel.innerHTML=TEAMS.map(function(t,i){return '<option value="'+i+'">Pick → '+t+'</option>';}).join('');
  }
}
function buildRosterPanel(team,picks){
  if(!picks.length) return '<div class="team-roster-panel visible"><div style="font-size:13px;color:#bbb;font-style:italic;padding:6px 0">No picks yet</div></div>';
  const bySport={NFL:[],NBA:[],NHL:[],MLB:[]};
  picks.forEach(function(p){if(bySport[p.sport])bySport[p.sport].push(p);});
  const html=['NFL','NHL','NBA','MLB'].map(function(sport){
    if(!bySport[sport].length) return '';
    return '<div class="roster-sport-group"><div class="roster-sport-label">'+sport+'</div>'
      +bySport[sport].map(function(p){return '<div class="roster-player"><span>'+p.player+'</span><span class="roster-player-pos">'+p.position+'</span></div>';}).join('')
      +'</div>';
  }).join('');
  return '<div class="team-roster-panel visible">'+html+'</div>';
}
function toggleTeam(idx){selectedTeamIdx=selectedTeamIdx===idx?null:idx;renderTeams();}

// ── Render summary/picks ─────────────────────────────────────
function renderKeeperSummary(){
  document.getElementById('right-sidebar-content').innerHTML=TEAMS.map(function(t){
    const keepers=keepersForTeam(t);
    const badge='<span class="keeper-team-badge '+(keepers.length>=MAX_KEEPERS?'full':'')+'">'+keepers.length+'/25</span>';
    const list=keepers.length
      ?keepers.map(function(k){return '<div class="keeper-player-item"><span>'+k.name+'</span><span class="keeper-player-sport">'+k.sport+'</span></div>';}).join('')

    return '<div class="keeper-team-section"><div class="keeper-team-header"><span class="keeper-team-name">'+t+'</span>'+badge+'</div>'+list+'</div>';
  }).join('');
}
function renderPicks(){
  if(!draftState.picks.length){document.getElementById('right-sidebar-content').innerHTML='<div class="empty-state">No picks yet</div>';return;}
  document.getElementById('right-sidebar-content').innerHTML=[...draftState.picks].reverse().map(function(p){

      +'<div class="pick-player">'+p.player+'</div>'
      +'<div class="pick-team">'+p.team+'</div>'
      +'</div>';

// ── Top bar ──────────────────────────────────────────────────
function renderTopBar(){
  const pick=draftState.currentPick, total=TOTAL_ROUNDS*12;
  if(pick>=total){document.getElementById('clock-team').textContent='Draft complete!';document.getElementById('timer').textContent='—';return;}
  const round=Math.floor(pick/12)+1,pickInRound=(pick%12)+1;
  document.getElementById('clock-team').textContent=teamForPick(pick);
  document.getElementById('pick-badge').textContent='R'+round+' P'+pickInRound;
  const t=document.getElementById('timer');
  t.textContent=formatTime(draftState.timerSeconds);
  t.className='timer';
  if(draftState.paused)t.classList.add('paused');
  else if(draftState.timerSeconds===0)t.classList.add('expired');
  else if(draftState.timerSeconds<300)t.classList.add('warning');
  document.getElementById('paused-pill').style.display=draftState.paused?'inline':'none';
  document.getElementById('pause-btn').textContent=draftState.paused?'Resume':'Pause';
}

// ── Timer / autopick ─────────────────────────────────────────
function startTimer(){
  clearInterval(timerInterval);
  timerInterval=setInterval(function(){
    if(isKeeperMode()||draftState.paused||draftState.timerSeconds<=0) return;
    draftState.timerSeconds--;
    renderTopBar();
    if(draftState.timerSeconds===0&&isDraftActiveHour()) startAutopickCountdown();
  },1000);
}
function startAutopickCountdown(){
  if(autopickInterval) return;
  autopickCountdown=AUTOPICK_GRACE;
  document.getElementById('autopick-banner').classList.add('visible');
  document.getElementById('autopick-pill').style.display='inline';
  document.getElementById('autopick-countdown').textContent=autopickCountdown;
  autopickInterval=setInterval(function(){
    if(draftState.paused||!isDraftActiveHour()){clearAutopickCountdown();return;}
    autopickCountdown--;
    document.getElementById('autopick-countdown').textContent=autopickCountdown;
    if(autopickCountdown<=0){clearAutopickCountdown();executeAutopick();}
  },1000);
}
function clearAutopickCountdown(){
  clearInterval(autopickInterval);autopickInterval=null;
  document.getElementById('autopick-banner').classList.remove('visible');
  document.getElementById('autopick-pill').style.display='none';
}
function executeAutopick(){
  const best=allPlayers.find(function(p){return !p.drafted&&!isKept(p.name);});
  if(!best) return;
  const pick=draftState.currentPick,round=Math.floor(pick/12)+1,team=teamForPick(pick);
  db.ref('draft/picks/'+pick).set({pickNum:pick+1,round:round,player:best.name,sport:best.sport,position:best.position,team:team,auto:true,timestamp:Date.now()});
  db.ref('draft/currentPick').set(pick+1);
  db.ref('draft/timerSeconds').set(TIMER_SECONDS);
}

// ── Draft actions ────────────────────────────────────────────
function togglePause(){db.ref('draft/paused').set(!draftState.paused);}
function initDraft(playerName){
  const p=allPlayers.find(function(pl){return pl.name===playerName;});
  if(!p||p.drafted||isKept(p.name)) return;
  const team=teamForPick(draftState.currentPick);
  if(myTeamName&&myTeamName!==team&&myTeamName!=='commissioner'){
    alert('It is '+team+"'s pick — please wait your turn!"); return;
  }
  pendingAction={type:'draft',player:p};
  document.getElementById('modal-title').textContent='Confirm pick';
  document.getElementById('modal-body').textContent='Draft '+p.name+' ('+p.sport+' · '+p.position+') for '+team+'?';
  document.getElementById('modal').classList.add('visible');
}
function closeModal(){document.getElementById('modal').classList.remove('visible');pendingAction=null;}
function confirmAction(){
  if(!pendingAction) return;
  if(pendingAction.type==='draft'){
    const p=pendingAction.player,pick=draftState.currentPick,round=Math.floor(pick/12)+1,team=teamForPick(pick);
    db.ref('draft/picks/'+pick).set({pickNum:pick+1,round:round,player:p.name,sport:p.sport,position:p.position,team:team,auto:false,timestamp:Date.now()});
    db.ref('draft/currentPick').set(pick+1);
    db.ref('draft/timerSeconds').set(TIMER_SECONDS);
    clearAutopickCountdown();
  }
  closeModal();
}
function advanceClock(){
  const idx=parseInt(document.getElementById('comm-team-select').value);
  db.ref('draft/currentPick').set(idx);
  db.ref('draft/timerSeconds').set(TIMER_SECONDS);
  clearAutopickCountdown();
}
function resetDraft(){
  if(!confirm('Reset the entire draft? This cannot be undone.')) return;
  db.ref('draft').set({currentPick:0,paused:false,timerSeconds:TIMER_SECONDS,picks:[],keepers:draftState.keepers,keepersLocked:false});
  clearAutopickCountdown();
}
function showNameModal(){
  const name=prompt('Enter your team name exactly as listed:',myTeamName);
  if(name){myTeamName=name.trim();localStorage.setItem('wmsfl_team',myTeamName);}
}

// ── Export ───────────────────────────────────────────────────
function downloadCSV(filename,rows){
  const csv=rows.map(function(r){return r.map(function(c){return '"'+String(c).replace(/"/g,'""')+'"';}).join(',');}).join('\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
  a.download=filename; a.click();
}
function exportDraftCSV(){
  if(!draftState.picks.length){alert('No picks yet.');return;}
  const rows=[['Pick #','Round','Pick in Round','Team','Player','Sport','Position','Auto']];
  TEAMS.forEach(function(t){keepersForTeam(t).forEach(function(k){rows.push(['KEEPER','','',t,k.name,k.sport,k.position||'','No']);});});
  [...draftState.picks].sort(function(a,b){return a.pickNum-b.pickNum;}).forEach(function(p){
    rows.push([p.pickNum,Math.floor((p.pickNum-1)/12)+1,((p.pickNum-1)%12)+1,p.team,p.player,p.sport,p.position||'',p.auto?'Yes':'No']);
  });
  downloadCSV('WMSFL_Draft_'+new Date().toISOString().slice(0,10)+'.csv',rows);
}
function exportKeeperCSV(){
  const total=TEAMS.reduce(function(s,t){return s+keepersForTeam(t).length;},0);
  if(!total){alert('No keepers entered yet.');return;}
  const rows=[['Team','Player','Sport','Position']];
  TEAMS.forEach(function(t){keepersForTeam(t).forEach(function(k){rows.push([t,k.name,k.sport,k.position||'']);});});
  downloadCSV('WMSFL_Keepers_'+new Date().toISOString().slice(0,10)+'.csv',rows);
}

// ── State sync ───────────────────────────────────────────────
function applyState(state){
  const prevPick=draftState.currentPick;
  draftState.currentPick=state.currentPick||0;
  draftState.paused=state.paused||false;
  draftState.timerSeconds=state.timerSeconds!==undefined?state.timerSeconds:TIMER_SECONDS;
  draftState.picks=state.picks?Object.values(state.picks):[];
  draftState.keepers=state.keepers||{};
  draftState.keepersLocked=state.keepersLocked||false;
  const drafted=new Set(draftState.picks.map(function(p){return p.player;}));
  allPlayers.forEach(function(p){
    p.drafted=drafted.has(p.name);
    if(p.drafted){const pk=draftState.picks.find(function(pk){return pk.player===p.name;});p.draftedBy=pk?pk.team:null;}
  });
  if(draftState.currentPick!==prevPick) clearAutopickCountdown();
  if(draftState.paused) clearAutopickCountdown();
  const sel=document.getElementById('keeper-team-select');
  if(sel.options.length<=1) TEAMS.forEach(function(t){const o=document.createElement('option');o.value=t;o.textContent=t;sel.appendChild(o);});
  applyMode();
  updateKeeperCounter();
  updateKeeperProgress();
  renderTopBar();
  renderTeams();
  renderPool();
}

// ── Init ─────────────────────────────────────────────────────
async function init(){
  await loadPlayers();
  document.getElementById('loading-sub').textContent='Connecting to draft room…';
  const stateRef=db.ref('draft');
  stateRef.once('value',function(snap){if(!snap.exists())db.ref('draft').set({currentPick:0,paused:false,timerSeconds:TIMER_SECONDS,keepersLocked:false});});
  stateRef.on('value',function(snap){applyState(snap.val()||{});});
  startTimer();
  document.getElementById('loading').style.display='none';
  const app=document.getElementById('app');
  app.style.display='flex';
}
init().catch(function(err){document.getElementById('loading').innerHTML='<div style="color:#e74c3c">Error: '+err.message+'</div>';});
</script>
